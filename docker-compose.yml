services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: botdoc
      POSTGRES_PASSWORD: botdoc
      POSTGRES_DB: botdoc_lite_reports
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"  # host 5433 → container 5432 (avoids conflict with Connect on 5432)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botdoc -d botdoc_lite_reports"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://botdoc:botdoc@db:5432/botdoc_lite_reports
      NODE_ENV: production
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
